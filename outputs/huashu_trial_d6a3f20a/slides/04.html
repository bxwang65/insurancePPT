<!doctype html><html><head><meta charset="utf-8"><style>html,body{width:1280px;height:720px;margin:0;padding:0;overflow:hidden;} body{font-family:PingFang SC,Microsoft YaHei,sans-serif;background:#f5f7fb;color:#16324f;} .wrap{padding:36px 48px;} h1{font-size:52px;margin:0 0 20px;color:#c89a45;} h2{font-size:40px;margin:0 0 18px;} p{font-size:28px;line-height:1.42;margin:8px 0;} .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;} .card{border:1px solid #d4b169;border-radius:14px;background:#fff;padding:14px;} .kpi{font-size:48px;font-weight:700;color:#12314d;} table{width:100%;border-collapse:collapse;font-size:18px;background:#fff;} th{background:#12314d;color:#fff;padding:8px;border:1px solid #d9e4ef;} td{padding:7px;border:1px solid #d9e4ef;text-align:center;} .small{font-size:22px;color:#4c637c;} img{max-width:100%;max-height:100%;display:block;border-radius:10px;} .row{display:flex;gap:16px;} .left{width:60%;} .right{width:40%;}</style></head><body><div class="wrap"><h2>教育金提领路径（示例）</h2><div class="card"><p>18岁起每年提领 US$35,000（示例口径）</p><p>目标：覆盖本科/硕士阶段学费与生活费</p><p>提领后仍保留退保现金价值，兼顾流动性与传承</p></div><div class="grid" style="margin-top:14px;"><div class="card"><p class="kpi">385,000</p><p class="small">18岁累计提领</p></div><div class="card"><p class="kpi">225,352,215</p><p class="small">18岁提后剩余现价</p></div></div></div></body></html>
